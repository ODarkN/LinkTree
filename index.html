<!DOCTYPE html>
<html lang="en"> <!-- Set the page language -->
<head>
  <meta charset="UTF-8" /> <!-- Character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <!-- Responsive for mobile -->
  <title>Link in bio</title> <!-- Page title shown in browser tab -->

  <!-- Google Fonts preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Import Inter font family from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container"> <!-- Main content container centered -->

    <!-- Avatar -->
    <img class="avatar" src="https://art.pixilart.com/sr5za25b0aed56aws3.png" alt="Logo"> <!-- User profile image -->

    <!-- username -->
    <h1>@ODarkN</h1> <!-- Replace with your own username -->

    <!-- Bio -->
    <p class="bio">C#, Unity, Frontend Dev | Pixel, 3D artist | Investor 🌈 </p> <!-- Short description or bio -->

    <!-- Links Section -->
    <div class="links"> <!-- Container for all links -->
      <a href="#" class="link">Twitter</a> <!-- Each link styled as a button -->
      <a href="#" class="link">Github</a>
      <a href="#" class="link">Pixilart</a>
    </div>

    <!-- Optional Footer -->
    <footer>© 2026</footer> <!-- Footer text -->
  </main>

</body>
</html>
